<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shoe Website</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <aside>
        <img src="./images/side_image1.png" alt="Side Image 1" />
        <img src="./images/side_image2.png" alt="Side Image 2" />
        <img src="./images/side_image3.png" alt="Side Image 3" />
        <img src="./images/side_image4.png" alt="Side Image 4" />
        <img src="./images/side_image5.png" alt="Side Image 5" />
        <img src="./images/side_image6.png" alt="Side Image 6" />
      </aside>

      <section class="image_container">
        <img src="./images/center_image.png" alt="Side Image 1" />
      </section>
      <section class="content">
        <p class="green-text">Sustainable Materials</p>
        <h1>NIke Revolution 8</h1>
        <h4>Men’s Road Running Shoes</h4>
        <h2>MRP - $0.00</h2>
        <p>Inclusive of all taxes</p>
        <p>Also includes all applicable duties</p>
        <section>
          <img src="./images/variant1.png" alt="Variant 1" />
          <img src="./images/variant2.png" alt="Variant 2" />
          <img src="./images/variant3.png" alt="Variant 3" />
          <img src="./images/variant4.png" alt="Variant 4" />
        </section>
        <section class="size_section">
          <div class="size_header">
            <h3>Select Size</h3>
            <p>Size Guide</p>
          </div>
          <div class="sizes">
            <div class="size">6</div>
            <div class="size">6.5</div>
            <div class="size">7</div>
            <div class="size">7.5</div>
            <div class="size">8</div>
            <div class="size">8.5</div>
            <div class="size">9</div>
            <div class="size">9.5</div>
            <div class="size">10</div>
          </div>
        </section>
        <button class="add_to_bag">Add to Bag</button>
        <button class="wishlist">Favourite</button>
      </section>
    </main>
  </body>
</html>
